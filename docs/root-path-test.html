<!DOCTYPE html>
<html>
<head>
    <title>Root Path Image Loading Confirmation</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1, h2 {
            color: #ffcc00;
            text-shadow: 0 0 5px rgba(255, 204, 0, 0.3);
        }
        
        .success-banner {
            background-color: #2e7d32;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
            display: none;
        }
        
        .images-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .image-item {
            background-color: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .image-box {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            margin-bottom: 10px;
            position: relative;
        }
        
        .image-box img {
            max-width: 100%;
            max-height: 100%;
        }
        
        .status {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #d32f2f;
        }
        
        .status.loaded {
            background-color: #2e7d32;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #ffcc00;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Root Path Image Loading Confirmation</h1>
    <p>This page verifies that images can be loaded from the root-level <code>images/</code> path.</p>
    
    <div id="success-banner" class="success-banner">
        All images loaded successfully! The fix is working!
    </div>
    
    <a href="index.html" class="back-link">← Return to Main Page</a>
    
    <h2>Testing All Game Images</h2>
    <div class="images-container" id="imagesContainer">
        <!-- Images will be inserted here by JavaScript -->
    </div>
    
    <script>
        // List of all image files to test
        const imageFiles = [
            { name: "DigDug", path: "DigDugRight.PNG" },
            { name: "PacMan", path: "PacManRight.PNG" },
            { name: "Blue Koopa", path: "BlueKoopaRight.PNG" },
            { name: "WaddleD", path: "WaddleDRight.PNG" },
            { name: "Egg", path: "Egg.png" },
            { name: "Platform Health", path: "PlatHealth.png" },
            { name: "Platform Ice", path: "PlatIce.PNG" },
            { name: "Platform Lava", path: "PlatLava.PNG" },
            { name: "Platform Slime", path: "PlatSlime.png" },
            { name: "Platform Truss", path: "PlatTruss.PNG" },
            { name: "Game Over", path: "gameover0.png" }
        ];
        
        // Create image elements for testing
        const container = document.getElementById('imagesContainer');
        const imageElements = [];
        
        imageFiles.forEach(file => {
            const div = document.createElement('div');
            div.className = 'image-item';
            
            const imageBox = document.createElement('div');
            imageBox.className = 'image-box';
            
            const img = document.createElement('img');
            img.src = `/images/${file.path}`;
            img.alt = file.name;
            imageElements.push(img);
            
            const status = document.createElement('div');
            status.className = 'status';
            imageBox.appendChild(status);
            
            img.onload = function() {
                status.classList.add('loaded');
                checkAllLoaded();
            };
            
            imageBox.appendChild(img);
            div.appendChild(imageBox);
            
            const caption = document.createElement('div');
            caption.innerHTML = `<strong>${file.name}</strong><br><code>images/${file.path}</code>`;
            div.appendChild(caption);
            
            container.appendChild(div);
        });
        
        // Check if all images are loaded
        function checkAllLoaded() {
            const allLoaded = imageElements.every(img => img.complete && img.naturalWidth > 0);
            if (allLoaded) {
                document.getElementById('success-banner').style.display = 'block';
            }
        }
        
        // Check after a timeout in case some images loaded very quickly
        setTimeout(checkAllLoaded, 1000);
    </script>
</body>
</html>
