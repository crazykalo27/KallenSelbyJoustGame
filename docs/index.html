<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joust Game</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    #debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 10px;
      max-width: 400px;
      max-height: 200px;
      overflow-y: scroll;
    }
    .debug-log {
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Loading Joust</h1>
    <div class="spinner"></div>
    <p id="status">Initializing...</p>
  </div>

  <div id="debug">
    <div class="debug-log">Debug Log:</div>
  </div>

  <script type="text/javascript">
    var status = document.getElementById('status');
    var loading = document.getElementById('loading');
    var debugLog = document.getElementById('debug');
    
    function log(message) {
      var logEntry = document.createElement('div');
      logEntry.className = 'debug-log';
      logEntry.textContent = new Date().toLocaleTimeString() + ': ' + message;
      debugLog.appendChild(logEntry);
      debugLog.scrollTop = debugLog.scrollHeight;
    }
    
    // Global error handler for the game
    window.handleGameError = function(message) {
      log('GAME ERROR: ' + message);
      status.textContent = 'Game Error: ' + message;
    };
    
    // Simple error capturing without recursion
    window.addEventListener('error', function(e) {
      log('JS ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
    });
    
    log('Page initialized');
    status.textContent = 'Loading GWT module...';
    
    function onScriptLoad() {
      log('GWT nocache.js loaded successfully');
      status.textContent = 'GWT module loaded, initializing game...';
    }
    
    function onScriptError() {
      log('Failed to load GWT nocache.js');
      loading.innerHTML = '<h1>Failed to Load Game</h1>' +
        '<div class="error">' +
        '<p>The GWT module failed to load. Check the debug log below.</p>' +
        '</div>';
    }
    
    // Track GWT module loading progress
    var checkInterval = setInterval(function() {
      if (window.com_joust_JoustGame) {
        log('GWT module object found');
        clearInterval(checkInterval);
      } else if (window.__gwtModuleFunction) {
        log('GWT module function found');
      }
    }, 1000);
    
    // Timeout after 30 seconds
    setTimeout(function() {
      if (status.textContent.includes('Initializing') || status.textContent.includes('Loading')) {
        log('TIMEOUT: Game failed to initialize within 30 seconds');
        status.textContent = 'Game initialization timeout - check debug log';
        clearInterval(checkInterval);
      }
    }, 30000);
    
    log('Creating script element');
    
    // Create and load the main GWT script
    var script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = './html/com.joust.JoustGame.nocache.js';
    script.onload = onScriptLoad;
    script.onerror = onScriptError;
    document.head.appendChild(script);
    
    log('Script element added to head');
  </script>
</body>
</html>
