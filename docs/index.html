<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joust Game</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Loading Joust</h1>
    <div class="spinner"></div>
    <p id="status">Initializing...</p>
  </div>

  <script type="text/javascript">
    var status = document.getElementById('status');
    var loading = document.getElementById('loading');
    
    status.textContent = 'Loading game files...';
    
    function onScriptLoad() {
      status.textContent = 'Game loaded successfully!';
      // The GWT module will handle hiding the loading screen
    }
    
    function onScriptError() {
      loading.innerHTML = '<h1>Failed to Load Game</h1>' +
        '<div class="error">' +
        '<p>Sorry, the game failed to load. This could be due to:</p>' +
        '<ul>' +
        '<li>Network connectivity issues</li>' +
        '<li>Browser compatibility problems</li>' +
        '<li>Server issues</li>' +
        '</ul>' +
        '<p>Please try refreshing the page or try again later.</p>' +
        '</div>';
    }
    
    // Create and load the main GWT script
    var script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = './com.joust.JoustGame/com.joust.JoustGame.nocache.js';
    script.onload = onScriptLoad;
    script.onerror = onScriptError;
    document.head.appendChild(script);
  </script>
</body>
</html>
