<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Format Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            margin: 20px;
        }
        img {
            max-width: 300px;
            border: 1px solid #ddd;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .download-link {
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Image Format Converter</h1>
    
    <div>
        <h2>Original PNG Image</h2>
        <img id="original-image" src="images/DigDugRight.PNG" alt="Original Image">
        <p id="original-status">Loading original image...</p>
    </div>
    
    <div>
        <h2>Converted Image</h2>
        <canvas id="canvas"></canvas>
        <p id="converted-status">Waiting for conversion...</p>
        <div>
            <button id="convert-to-jpeg">Convert to JPEG</button>
            <button id="convert-to-png">Convert to PNG</button>
        </div>
        <div id="download-container"></div>
    </div>

    <script>
        const originalImg = document.getElementById('original-image');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const originalStatus = document.getElementById('original-status');
        const convertedStatus = document.getElementById('converted-status');
        const downloadContainer = document.getElementById('download-container');

        // Check if original image loaded
        originalImg.onload = function() {
            originalStatus.textContent = "Original image loaded successfully!";
            originalStatus.style.color = "green";
            
            // Set canvas size to match image
            canvas.width = originalImg.naturalWidth;
            canvas.height = originalImg.naturalHeight;
        };

        originalImg.onerror = function() {
            originalStatus.textContent = "Error loading original image!";
            originalStatus.style.color = "red";
        };

        document.getElementById('convert-to-jpeg').addEventListener('click', () => {
            convertImage('image/jpeg', 'jpeg');
        });

        document.getElementById('convert-to-png').addEventListener('click', () => {
            convertImage('image/png', 'png');
        });

        function convertImage(mimeType, extension) {
            if (originalImg.complete && originalImg.naturalWidth) {
                // Draw the image on the canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(originalImg, 0, 0);
                
                try {
                    // Convert canvas to specified format
                    const dataURL = canvas.toDataURL(mimeType);
                    
                    // Create download link
                    const downloadLink = document.createElement('a');
                    downloadLink.href = dataURL;
                    downloadLink.download = `digdug.${extension}`;
                    downloadLink.textContent = `Download ${extension.toUpperCase()}`;
                    downloadLink.className = 'download-link';
                    
                    // Clear previous links and add new one
                    downloadContainer.innerHTML = '';
                    downloadContainer.appendChild(downloadLink);
                    
                    convertedStatus.textContent = `Successfully converted to ${extension.toUpperCase()}!`;
                    convertedStatus.style.color = "green";
                } catch (e) {
                    convertedStatus.textContent = `Error converting image: ${e.message}`;
                    convertedStatus.style.color = "red";
                }
            } else {
                convertedStatus.textContent = "Cannot convert: original image not loaded properly.";
                convertedStatus.style.color = "red";
            }
        }
    </script>
</body>
</html>
