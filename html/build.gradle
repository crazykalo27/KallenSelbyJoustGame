apply plugin: "java-library"
apply plugin: "org.docstr.gwt"
apply plugin: "war"

dependencies {
    implementation project(":core")
    api "com.badlogicgames.gdx:gdx-backend-gwt:$gdxVersion"
    api "com.badlogicgames.gdx:gdx:$gdxVersion:sources"
    api "com.badlogicgames.gdx:gdx-backend-gwt:$gdxVersion:sources"
    api "com.badlogicgames.gdx:gdx-box2d:$gdxVersion:sources"
    api "com.badlogicgames.gdx:gdx-box2d-gwt:$gdxVersion:sources"
}

gwt {
    gwtVersion = '2.8.2' // Downgraded to match libGDX compatibility
    maxHeapSize = "2G" // Increased for better compilation performance
    minHeapSize = "1G"

    src = files(project(":core").sourceSets.main.java.srcDirs, file("src/"))
    modules 'com.joust.GdxDefinition'
    devModules 'com.joust.GdxDefinitionSuperdev'
    project.webAppDirName = 'webapp'

    compiler {
        strict = true
        optimize = 9
        draftCompile = false
        // disableClassMetadata = true // Optimizations make these redundant
        // disableCastChecking = true
    }
}

// Asset copying task to align with standard practice
processResources {
  from("$projectDir/../core/assets") {
    into "assets"
  }
}

// The standard gwt:dist task will now handle building the distribution.
// The old 'dist' and 'war' tasks are no longer necessary for this deployment model.

task addSource {
    doLast {
        sourceSets.main.compileClasspath += files(project(':core').sourceSets.main.allJava.srcDirs)
    }
}

tasks.compileGwt.dependsOn(addSource)
tasks.compileGwt.doFirst {
    files(project(':core').sourceSets.main.output.classesDirs).each {
        sourceSets.main.compileClasspath += files(it)
    }
}

sourceCompatibility = JavaVersion.VERSION_1_8
sourceSets.main.java.srcDirs = [ "src/", "../core/src" ]

eclipse {
    project {
        name = appName + "-html"
        linkedResource name: 'core_src', type: '2', location: '../core/src'
    }
}