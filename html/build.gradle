apply plugin: 'java-library'
apply plugin: 'org.docstr.gwt'
apply plugin: 'war'

dependencies {
  implementation project(':core')
  api "com.badlogicgames.gdx:gdx-backend-gwt:$gdxVersion"
  api "com.badlogicgames.gdx:gdx:$gdxVersion:sources"
  api "com.badlogicgames.gdx:gdx-backend-gwt:$gdxVersion:sources"
  api "com.badlogicgames.gdx:gdx-box2d:$gdxVersion:sources"
  api "com.badlogicgames.gdx:gdx-box2d-gwt:$gdxVersion:sources"
}

// Clean war directory before build to avoid permission issues
clean.doFirst {
    delete file("war")
    file("war").mkdirs()
}

gwt {
  gwtVersion = '2.8.2' // Compatible with LibGDX
  minHeapSize = "1024M"
  maxHeapSize = "2G"

  src = files(project(':core').sourceSets.main.java.srcDirs, sourceSets.main.java.srcDirs)
  
  modules 'com.joust.GdxDefinition'
  project.webAppDirName = 'webapp'

  compiler {
    strict = true
    disableCastChecking = true
    disableClassMetadata = true
    // Increase compilation timeouts
    localWorkers = Runtime.runtime.availableProcessors()
    sourceLevel = "1.8"
  }
}

// Task to manually clean the war/assets directory
task cleanWarAssets(type: Delete) {
    delete fileTree('war/assets')
}

task dist(dependsOn: [clean, compileGwt]) {
    doLast {
        file("build/dist/").mkdirs()
        copy {
            from("build/gwt/out/")
            into("build/dist/")
        }
        copy {
            from("../assets")
            into("build/dist/assets")
            exclude("**/*.txt")
        }
        // Copy specific assets that need processing
        copy {
            from("../assets")
            into("build/dist/assets")
            include("**/*.txt")
            filter { line -> line }  // This will ensure line endings are properly handled
        }
    }
}